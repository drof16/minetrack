services:
  - type: web
    name: minetrack
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: MineTrack
      - key: APP_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        value: https://minetrack-w2xo.onrender.com
      - key: ASSET_URL
        value: https://minetrack-w2xo.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: minetrack-db
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: minetrack-db
          property: connectionString
      - key: DB_SSLMODE
        value: require
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: public
      - key: MAIL_MAILER
        value: log
      - key: MAIL_FROM_ADDRESS
        value: hello@minetrack.local
      - key: VITE_APP_NAME
        value: MineTrack
      - key: FACEBOOK_GRAPH_VERSION
        value: v25.0
      - key: FACEBOOK_PAGE_ID
        sync: false
      - key: FACEBOOK_PAGE_ACCESS_TOKEN
        sync: false

databases:
  - name: minetrack-db
    plan: free
    region: singapore
    databaseName: minetrack
    user: minetrack
